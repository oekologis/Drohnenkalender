<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drohnen-Einsatzplanung</title>
<style>
  :root {
    color-scheme: light only;
    --mavic-bg: #E6F1FB; --mavic-fg: #0C447C; --mavic-dot: #378ADD;
    --matrice-bg: #E1F5EE; --matrice-fg: #085041; --matrice-dot: #1D9E75;
    --matrice2-bg: #FAECE7; --matrice2-fg: #712B13; --matrice2-dot: #D85A30;
    --bg: #f8f8f6; --surface: #ffffff;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18; --text-muted: #6b6b67; --text-faint: #9b9b96;
    --blue: #185FA5; --radius: 8px; --radius-lg: 12px;
  }

  html { background: #f8f8f6; -webkit-tap-highlight-color: transparent; }
  * { color-scheme: light only; box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg) !important; color: var(--text) !important;
    min-height: 100vh; padding: 12px 10px;
  }

  .app { max-width: 1000px; margin: 0 auto; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
  h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .status { font-size: 11px; color: var(--text-faint); }
  .status.ok { color: #1D9E75; } .status.err { color: #D85A30; }

  .legend { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--text); }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

  .nav { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .nav button {
    background: var(--surface); border: 0.5px solid var(--border-strong);
    border-radius: var(--radius); padding: 8px 14px; font-size: 14px; cursor: pointer;
  }
  .week-label { flex: 1; text-align: center; font-size: 15px; font-weight: 700; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-head { font-size: 11px; color: var(--text-faint); text-align: center; padding-bottom: 5px; font-weight: 700; text-transform: uppercase; }
  
  .day-cell {
    background: var(--surface) !important; border: 0.5px solid var(--border);
    border-radius: 8px; padding: 6px; min-height: 95px; cursor: pointer;
    transition: transform 0.1s; position: relative;
  }
  .day-cell .booking { pointer-events: none; }
  .day-cell .dots-row { pointer-events: none; }
  .day-cell .dnum { pointer-events: none; }

  .day-cell:active { transform: scale(0.98); }
  .day-cell.today { border-color: var(--blue); border-width: 2px; }
  .day-cell.past { opacity: 0.55; }
  .dnum { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; }
  .today .dnum { color: var(--blue); }

  .booking {
    border-radius: 4px; padding: 3px 5px; font-size: 10px; font-weight: 700;
    margin-bottom: 3px; display: flex; align-items: center; gap: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .booking-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .dots-row { display: none; flex-direction: column; gap: 3px; margin-top: 2px; }
  .booking-compact { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; }
  .compact-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Modals */
  .overlay, .day-overlay, .del-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.open, .day-overlay.open, .del-overlay.open { display: flex; }
  .modal, .day-modal, .del-modal {
    background: var(--surface); border-radius: 16px; padding: 20px;
    width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
  .field select, .field input {
    width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--border-strong);
    border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none;
    -webkit-appearance: none;
  }
  
  select option:disabled { color: var(--text-faint); font-style: normal; }

  .preview {
    border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 8px; background: var(--bg); margin-bottom: 15px;
  }
  .preview-dot { width: 10px; height: 10px; border-radius: 50%; display: none; }

  .btn-row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px; font-size: 15px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border-strong); font-weight: 700; }
  .btn-primary { background: var(--blue) !important; color: #fff !important; border-color: var(--blue); }

  @media (max-width: 500px) and (orientation: portrait) {
    .booking { display: none; }
    .dots-row { display: flex; }
    .day-cell { min-height: 75px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div>
      <h1>Drohnen-Einsatzplanung</h1>
      <div class="status" id="conn-status">Verbinde...</div>
    </div>
  </header>
  
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--mavic-dot)"></div>Mavic 3T</div>
    <div class="leg"><div class="leg-dot" style="background:var(--matrice-dot)"></div>Matrice 4T (1)</div>
    <div class="leg"><div class="leg-dot" style="background:var(--matrice2-dot)"></div>Matrice 4T (2)</div>
  </div>

  <div class="nav">
    <button onclick="changeWeek(-1)">←</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="changeWeek(1)">→</button>
  </div>

  <div class="cal-grid" id="cal"></div>
</div>

<div class="day-overlay" id="day-modal">
  <div class="day-modal">
    <h2 id="day-modal-title" style="margin-bottom:15px; font-size:16px;"></h2>
    <div id="day-entries"></div>
    <div class="btn-row" style="margin-top:15px;">
      <button class="btn" onclick="closeDayModal()">Schließen</button>
      <button class="btn btn-primary" id="modal-add-btn" onclick="openNewFromDay()">+ Buchen</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <h2 id="new-booking-title" style="margin-bottom:15px; font-size:16px;">Neu buchen</h2>
    <div class="field">
      <label>Drohne</label>
      <select id="drone-sel" onchange="updatePreview()">
        <option value="">— Drohne wählen —</option>
        <option value="mavic">Mavic 3T</option>
        <option value="matrice">Matrice 4T (1)</option>
        <option value="matrice2">Matrice 4T (2)</option>
      </select>
    </div>
    <div class="field">
      <label>Einsatzgebiet</label>
      <select id="area-sel" onchange="updatePreview()">
        <option value="">— Gebiet auswählen —</option>
        <option value="BL">Blockland (BL)</option>
        <option value="SJL">St. Jürgensland (SJL)</option>
        <option value="NVL">Niedervieland (NVL)</option>
        <option value="KW">Kladdinger Wiesen (KW)</option>
        <option value="WN">Wümmeniederung (WN)</option>
        <option value="BW">Borgfelder Wümmewiesen (BW)</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
    </div>
    <div class="field">
      <label>Dein Kürzel</label>
      <input type="text" id="kuerzel" placeholder="z.B. BB" maxlength="10" oninput="updatePreview()">
    </div>
    <div class="preview" id="preview">
      <div class="preview-dot" id="preview-dot"></div>
      <span id="preview-text">Vorschau</span>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveBooking()" disabled>Speichern</button>
    </div>
  </div>
</div>

<div class="del-overlay" id="del-modal">
  <div class="del-modal">
    <h3 style="margin-bottom:8px; font-size:15px; color:#D85A30;">Eintrag löschen?</h3>
    <p id="del-text" style="font-weight:700; margin-bottom:18px; font-size:14px; line-height:1.4;"></p>
    <div class="btn-row">
      <button class="btn" onclick="closeDel()">Nein</button>
      <button class="btn" style="background:#D85A30!important; color:#fff!important; border-color:#D85A30;" onclick="confirmDelete()">Löschen</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://pquibqnvhkfdaklccbjc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AntSEndT1JjZ1ZTCOoj5ng_5AJ98sWl';

const DRONES = {
  mavic:    { label: 'Mavic 3T',       bg: 'var(--mavic-bg)',    fg: 'var(--mavic-fg)',    dot: 'var(--mavic-dot)'    },
  matrice:  { label: 'Matrice 4T (1)', bg: 'var(--matrice-bg)',  fg: 'var(--matrice-fg)',  dot: 'var(--matrice-dot)'  },
  matrice2: { label: 'Matrice 4T (2)', bg: 'var(--matrice2-bg)', fg: 'var(--matrice2-fg)', dot: 'var(--matrice2-dot)' },
};

let weekOffset = 0, selectedDate = null, selectedDateLabel = "", bookings = {}, deleteId = null;

async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation',
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text(); return t ? JSON.parse(t) : [];
}

async function loadBookings() {
  const mon = getMonday(new Date()); mon.setDate(mon.getDate() + weekOffset * 7);
  const end = new Date(mon); end.setDate(end.getDate() + 6);
  const rows = await sbFetch(`bookings?date=gte.${dateKey(mon)}&date=lte.${dateKey(end)}&order=created_at`);
  bookings = {};
  rows.forEach(r => { if (!bookings[r.date]) bookings[r.date] = []; bookings[r.date].push(r); });
}

function getMonday(d) { const d2=new Date(d),day=d2.getDay()||7; d2.setDate(d2.getDate()-day+1); d2.setHours(0,0,0,0); return d2; }
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmt(d) { return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }

async function changeWeek(n) { weekOffset += n; await refreshCal(); }

async function refreshCal() {
  try { await loadBookings(); setStatus('ok','Verbunden'); } catch(e) { setStatus('err','Fehler'); }
  renderCal();
}

function setStatus(t,m) { const el=document.getElementById('conn-status'); el.textContent=m; el.className='status '+t; }

function renderCal() {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = getMonday(today); base.setDate(base.getDate() + weekOffset * 7);
  document.getElementById('week-label').textContent = fmt(base) + ' – ' + fmt(new Date(base.getTime() + 6*86400000));
  
  const days = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html = days.map(d=>`<div class="day-head">${d}</div>`).join('');
  
  for (let i=0; i<7; i++) {
    const d = new Date(base); d.setDate(d.getDate()+i);
    const key = dateKey(d);
    const entries = bookings[key] || [];
    const isToday = d.getTime()===today.getTime();
    const isPast = d < today;

    // Label VOR dem Template-String berechnen – verhindert Anführungszeichen-Konflikt im onclick
    const dayLabel = d.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'2-digit'});

    const bookingHtml = entries.map(b => {
      const dr = DRONES[b.drone]; if (!dr) return '';
      const locStr = b.location ? ` [${b.location}]` : '';
      return `<div class="booking" style="background:${dr.bg};color:${dr.fg}">
                <div class="booking-dot" style="background:${dr.dot}"></div>${dr.label} · ${b.label}${locStr}
              </div>`;
    }).join('');

    const dotsHtml = entries.map(b => {
      const dr = DRONES[b.drone]; if (!dr) return '';
      return `<div class="booking-compact" style="color:${dr.dot}"><div class="compact-dot" style="background:${dr.dot}"></div>${b.label}</div>`;
    }).join('');

    html += `<div class="day-cell${isToday?' today':''}${isPast?' past':''}" onclick="openDayModal('${key}','${dayLabel}')">
      <div class="dnum">${d.getDate()}</div>
      ${bookingHtml}
      <div class="dots-row">${dotsHtml}</div>
    </div>`;
  }
  document.getElementById('cal').innerHTML = html;
}

function openDayModal(key, label) {
  selectedDate = key;
  selectedDateLabel = label;
  document.getElementById('day-modal-title').textContent = label;
  const entries = bookings[key] || [];
  const container = document.getElementById('day-entries');
  
  document.getElementById('modal-add-btn').style.display = (entries.length >= 3) ? 'none' : 'block';

  container.innerHTML = entries.length ? entries.map(b => {
    const dr = DRONES[b.drone];
    if (!dr) return '';
    const fullInfo = `${dr.label} · ${b.label}${b.location ? ' ['+b.location+']' : ''}`;
    return `<div style="background:${dr.bg}; color:${dr.fg}; padding:10px; border-radius:8px; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between;">
              <span style="font-weight:700; font-size:13px;">${fullInfo}</span>
              <button onclick="event.stopPropagation(); askDelete('${b.id}','${fullInfo}')" style="background:none; border:none; color:inherit; font-size:22px; cursor:pointer; padding: 0 5px;">✕</button>
            </div>`;
  }).join('') : '<div style="font-size:13px; color:var(--text-faint); text-align:center; padding:10px;">Noch keine Drohne gebucht</div>';
  document.getElementById('day-modal').classList.add('open');
}

function openNewFromDay() {
  closeDayModal();
  document.getElementById('new-booking-title').textContent = "Buchen: " + selectedDateLabel;
  document.getElementById('kuerzel').value = '';
  document.getElementById('area-sel').value = '';
  
  const existing = (bookings[selectedDate] || []).map(b => b.drone);
  const select = document.getElementById('drone-sel');
  select.value = '';

  Array.from(select.options).forEach(opt => {
    if (opt.value === "") return;
    if (existing.includes(opt.value)) {
      opt.disabled = true;
      opt.textContent = DRONES[opt.value].label + " — belegt";
    } else {
      opt.disabled = false;
      opt.textContent = DRONES[opt.value].label;
    }
  });

  updatePreview();
  document.getElementById('modal').classList.add('open');
}

function updatePreview() {
  const drone = document.getElementById('drone-sel').value;
  const area = document.getElementById('area-sel').value;
  const kuerzel = document.getElementById('kuerzel').value.trim();
  const p = document.getElementById('preview'), dot = document.getElementById('preview-dot'), btn = document.getElementById('save-btn');
  
  if (drone && kuerzel) {
    const dr = DRONES[drone];
    p.style.background = dr.bg; p.style.color = dr.fg;
    dot.style.background = dr.dot; dot.style.display = 'block';
    document.getElementById('preview-text').textContent = `${dr.label} · ${kuerzel}${area ? ' ['+area+']' : ''}`;
    btn.disabled = false;
  } else {
    p.style.background = ''; p.style.color = ''; dot.style.display = 'none';
    document.getElementById('preview-text').textContent = 'Bitte Drohne & Kürzel eingeben';
    btn.disabled = true;
  }
}

async function saveBooking() {
  const drone = document.getElementById('drone-sel').value;
  const area = document.getElementById('area-sel').value;
  const label = document.getElementById('kuerzel').value.trim();
  document.getElementById('save-btn').disabled = true;
  try {
    await sbFetch('bookings', { method: 'POST', body: JSON.stringify({ date: selectedDate, drone, label, location: area }) });
    closeModal(); await refreshCal();
  } catch(e) { alert('Fehler beim Speichern.'); }
  document.getElementById('save-btn').disabled = false;
}

function closeDayModal() { document.getElementById('day-modal').classList.remove('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function askDelete(id, fullString) { deleteId = id; document.getElementById('del-text').textContent = fullString; document.getElementById('del-modal').classList.add('open'); }
function closeDel() { document.getElementById('del-modal').classList.remove('open'); }

async function confirmDelete() { 
  try { await sbFetch('bookings?id=eq.'+deleteId, {method:'DELETE'}); closeDel(); closeDayModal(); await refreshCal(); }
  catch(e) { alert('Fehler beim Löschen.'); }
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.getElementById('del-modal').addEventListener('click', e => { if (e.target === document.getElementById('del-modal')) closeDel(); });
document.getElementById('day-modal').addEventListener('click', e => { if (e.target === document.getElementById('day-modal')) closeDayModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDel(); closeDayModal(); } });

refreshCal();
</script>
</body>
</html>
